# AMDBTX miner config
pool_host: "stratum.minebtx.com"
pool_port: 3333
pool_tls: false

payout_address: "btx1z...YOUR_BTX_ADDRESS_HERE..."
worker_name: "default"

gbt_solve_path: ""

# Solver tuning for AMD GPUs
solver_backend: "rocm"
solver_threads: 8
solver_prepare_workers: 16
solver_batch_size: 128
solver_prefetch_depth: 8
solver_pipeline_async: 1
gpu_inputs: 0

# GPU device selection (-1 = auto). Set to 0/1/.. to force a specific GPU
# on multi-GPU systems (e.g. laptops with iGPU+dGPU).
gpu_device: -1

nonces_per_slice: 20000000
solver_max_seconds_per_slice: 5.0

reconnect_initial_s: 1.0
reconnect_max_s: 60.0

log_level: "INFO"
