# AMDBTX miner config

# Mining mode: "pool" (stratum) or "solo" (local btxd node)
mining_mode: "pool"

pool_host: "stratum.bitminerpool.xyz"
pool_port: 3333
pool_tls: false
# pool_protocol: auto   # stratum on BitMinerPool; LuckyPool only on lproute.com hosts

payout_address: "btx1z...YOUR_BTX_ADDRESS_HERE..."
worker_name: "default"

gbt_solve_path: ""

# Solver tuning for AMD GPUs
solver_backend: "rocm"
# Feed the GPU: bump threads first (dexbtx v0.4.4 finding). Start at 16, sweep to min(24, nproc-4).
solver_threads: 16
solver_prepare_workers: 16
# RX 7800 XT / RDNA3 post-v3 path peaks around 2M-4M scan batches.
# Run `amdbtx-miner --benchmark` on other GPUs; older/smaller cards may prefer 524288-1048576.
solver_batch_size: 4194304
solver_prefetch_depth: 8
solver_pipeline_async: 1
gpu_inputs: 0
pool_max_shares_per_slice: 0

# Untested RDNA4 (RX 9060/9070, gfx1200/gfx1201) WMMA fast path.
# Requires a solver binary compiled with gfx12. CLI: --experimental-rdna4
# experimental_rdna4_wmma: false

# Optional benchmark override, comma string or YAML list.
benchmark_batch_sizes: [131072, 262144, 524288, 1048576, 2097152, 4194304, 8388608, 16777216]
benchmark_sweep_threads: false

# GPU device selection (-1 = auto, single best GPU). Set to 0/1/.. to force one GPU.
gpu_device: -1

# Multi-GPU: set gpu_devices to mine on several cards in parallel (hashrate stacks).
# Examples: "all", "0,1", or [0, 1]. Overrides gpu_device when set.
# gpu_devices: "all"
# gpu_devices: "0,1"

nonces_per_slice: 20000000
solver_max_seconds_per_slice: 5.0

reconnect_initial_s: 1.0
reconnect_max_s: 60.0

log_level: "INFO"

# --- Solo mining (mining_mode: solo) ---
# Mines against a synced btxd node (v0.32.3+). No pool, no dev fee.
# Requires getblocktemplate + getmatmulchallenge + submitblock over RPC.
# See README.md "Solo Mining" for full setup guide.
#
# Local node (cookie auth):
# mining_mode: solo
# rpc_url: "http://127.0.0.1:19334"
# rpc_cookie_file: "~/.btx/.cookie"
#
# Remote node (username/password — cookie file is local-only):
# mining_mode: solo
# rpc_url: "http://192.168.1.15:19334"
# rpc_user: "miner"
# rpc_password: "your_rpc_password"
#
# Solo dev fee: 200 bps = 2% of coinbase paid to dev wallet per block found.
# Set solo_dev_fee_bps: 0 to disable.
solo_dev_fee_bps: 200

# Optional solo overrides:
# btx_cli_path: "/usr/local/bin/btx-cli"
# coinbase_script_pubkey: ""   # hex scriptPubKey if validateaddress is unavailable
# dev_wallet: "btx1z..."       # override dev fee destination (default: built-in)
# gbt_longpoll: true
# gbt_longpoll_timeout: 60.0
# rpc_timeout: 120.0
